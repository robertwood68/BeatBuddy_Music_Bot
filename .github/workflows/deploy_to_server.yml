name: redeployment

on:
  push:
    branches:
      - master  

  workflow_dispatch:
  
jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set environment variables
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }} 
          PREFIX: ${{ secrets.PREFIX }}
          SOUNDCLOUD_API_KEY: ${{ secrets.SOUNDCLOUD_API_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
        run: |
          echo "BOT_TOKEN=${BOT_TOKEN}" >> .env
          echo "PREFIX=${PREFIX}" >> .env
          echo "SOUNDCLOUD_API_KEY=${SOUNDCLOUD_API_KEY}" >> .env
          echo "CLIENT_ID=${CLIENT_ID}" >> .env

      - name: Login to Docker Hub
        run: |
          docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}
      
      - name: Build and Push Docker Compose
        run: |
          docker compose -f docker-compose.yml build
          docker compose -f docker-compose.yml push

  deploy-server:
    runs-on: ubuntu-latest
    needs: [build_and_push]
    steps:
      - name: Trigger Komodo Deploy
        run: |
          curl -s --max-time 10 -X POST http://${{ secrets.SERVER_HOST }}:${{ secrets.PORT }}/execute \
            -H "X-Api-Key: ${{ secrets.KOMODO_API_KEY }}" \
            -H "X-Api-Secret: ${{ secrets.KOMODO_API_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"type": "DeployStack", "params": {"stack": "beatbuddy"}}'
